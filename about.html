html,body{

/* ── NAV ── */
nav{
  position:fixed;top:0;left:0;right:0;

.nav-logo{
  position:fixed;top:22px;left:24px;

.nav-right{display:none;}

/* ── WRAP ── */
.wrap{
  max-width:680px;
  margin:0 auto;
  padding:100px 40px 80px;
}

/* INFO 헤딩 — 두껍고 작게 */
.heading{
  font-family:'Bebas Neue',sans-serif;
  font-size:50px;
  font-weight:400;

  color:#111;
  margin-bottom:24px;
  text-transform:uppercase;
}

/* 사진 */
.photo{
  width:100%;
  height:auto;
  display:block;
  filter:grayscale(100%);
  margin-bottom:48px;
}

/* Contact 섹션 */
.section-label{
  font-size:9px;
  letter-spacing:.24em;
  text-transform:uppercase;
  color:#999;
  margin-bottom:16px;
  border-top:1px solid #e8e8e8;
  padding-top:20px;
}

.contact-row{
  display:flex;
  gap:20px;
  margin-bottom:10px;
  font-size:12px;
  letter-spacing:.06em;
}
.contact-key{
  color:#aaa;
  min-width:80px;
  font-size:10px;
  letter-spacing:.14em;
  text-transform:uppercase;
  padding-top:1px;
}
.contact-val{
  color:#111;
}
.contact-val a{
  color:#111;
  text-decoration:none;
  transition:color .2s;
}
.contact-val a:hover{color:#d4270a;}
</style>
