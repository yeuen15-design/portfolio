<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>解放 — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  overflow-x:hidden;
}

.bg{
  position:fixed;inset:0;
  background:url('hero.jpg') center/cover no-repeat;
  z-index:0;
}

.bg::after{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.04;pointer-events:none;
}

.logo{
  position:fixed;
  top:22px;left:24px;
  height:52px;width:auto;
  z-index:100;
  mix-blend-mode:multiply;
}

/* 로고 아래부터 시작하는 그리드 wrapper */
.main{
  position:relative;
  z-index:10;
  padding-top:96px; /* 로고 높이 + 여백 */
  padding-left:24px;
  padding-right:24px;
  padding-bottom:40px;
}

/* masonry grid */
.grid{
  column-count:4;
  column-gap:6px;
}
@media(max-width:1000px){.grid{column-count:3;}}
@media(max-width:680px){.grid{column-count:2;}}

.card{
  break-inside:avoid;
  margin-bottom:6px;
  display:block;
  overflow:hidden;
  cursor:pointer;
}
.card img{
  width:100%;height:auto;
  display:block;
  transition:transform .6s cubic-bezier(.22,1,.36,1), opacity .3s;
}
.card:hover img{transform:scale(1.03);opacity:.88;}

.copy{
  position:relative;z-index:10;
  text-align:center;
  padding:20px;
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.4);
}

#dot{
  position:fixed;width:7px;height:7px;border-radius:50%;
  background:#d4270a;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .18s,height .18s;
  mix-blend-mode:multiply;
}
</style>
</head>
<body>

<div id="dot"></div>
<div class="bg"></div>

<img class="logo" src="Logo.png" alt="解放"/>

<div class="main">
  <div class="grid">
    <div class="card"><img src="work1.jpg" alt="work1"/></div>
    <div class="card"><img src="work2.jpg" alt="work2"/></div>
    <div class="card"><img src="work3.jpg" alt="work3"/></div>
    <div class="card"><img src="work4.jpg" alt="work4"/></div>
    <div class="card"><img src="work5.jpg" alt="work5"/></div>
    <div class="card"><img src="work6.jpg" alt="work6"/></div>
  </div>
</div>

<p class="copy">©2025 解放. Seoul, KR</p>

<script>
const dot = document.getElementById('dot');
document.addEventListener('mousemove', e => {
  dot.style.left = e.clientX + 'px';
  dot.style.top  = e.clientY + 'px';
});
</script>

</body>
</html>
