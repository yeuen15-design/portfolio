<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;overflow-x:hidden;}

.bg{position:fixed;inset:0;background:#fff;z-index:0;}

.logo{position:fixed;top:22px;left:24px;height:52px;width:auto;z-index:200;animation:spin 8s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

.nav-right{
  position:fixed;top:20px;right:24px;
  display:flex;align-items:center;gap:20px;
  z-index:200;
  transition:right .5s cubic-bezier(.22,1,.36,1);
}
body.panel-open .nav-right{
  right:calc(var(--panel-w) + 24px);
}
.insta{opacity:.85;transition:opacity .2s;}
.insta:hover{opacity:1;}
.insta svg{width:22px;height:22px;fill:#111;display:block;}
.about{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:400;letter-spacing:.18em;text-transform:uppercase;color:#111;text-decoration:none;transition:opacity .2s;}
.about:hover{opacity:.5;}

.main{position:relative;z-index:10;padding:96px 24px 40px;transition:padding-right .5s cubic-bezier(.22,1,.36,1);}
body.panel-open .main{padding-right:calc(var(--panel-w) + 24px);}

.grid{column-gap:24px;transition:column-count .3s;}

/* ── 3D BOOK CARD ── */
.card{
  background: var(--card-bg);
  padding: 40px 20px;
  break-inside:avoid;
  margin-bottom:40px;
  cursor:pointer;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}

/* PNG 목업 카드 */
.card-img{
  break-inside:avoid;
  margin-bottom:40px;
  cursor:pointer;
  overflow:hidden;
  position:relative;
}
.card-img img{
  width:100%;height:auto;display:block;
  transition:transform .6s cubic-bezier(.22,1,.36,1), opacity .3s;
}
.card-img:hover img{transform:scale(1.02);opacity:.9;}

.book-scene{perspective:900px;}

.book{
  position:relative;
  transform-style:preserve-3d;
  transform:rotateY(30deg);
  transition:transform .6s cubic-bezier(.22,1,.36,1);
}
.card:hover .book{transform:rotateY(15deg);}

/* 앞면 */
.b-front{
  position:relative;
  overflow:hidden;
  background:#222;
  transform-style:preserve-3d;
}
.b-front img{width:100%;height:100%;object-fit:cover;display:block;}
.b-shine{position:absolute;inset:0;background:linear-gradient(110deg,rgba(255,255,255,0.15) 0%,rgba(255,255,255,0) 50%);pointer-events:none;z-index:2;}

/* 책등 */
.b-spine{
  position:absolute;top:0;left:0;
  overflow:hidden;
  transform-origin:100% 50%;
  transform:rotateY(-90deg);
}
.b-spine img{width:100%;height:100%;object-fit:fill;display:block;}
.b-spine-color{position:absolute;inset:0;}
.b-spine-shade{position:absolute;inset:0;background:linear-gradient(to right,rgba(255,255,255,0.1),rgba(0,0,0,0.25));z-index:1;}

/* 윗면 */
.b-top{position:absolute;top:0;left:0;transform-origin:50% 0%;}

/* 푸터 */
.copy{position:relative;z-index:10;text-align:center;padding:20px;font-family:'IBM Plex Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:rgba(0,0,0,.3);}

/* ── 슬라이드 패널 ── */
:root{
  --panel-w: 480px;
  --card-bg: #f0ebe0; /* ← 여기서 카드 배경색 변경 */
}
.panel{position:fixed;top:0;right:0;width:var(--panel-w);height:100vh;background:#fff;z-index:400;transform:translateX(100%);transition:transform .5s cubic-bezier(.22,1,.36,1);overflow-y:auto;display:flex;flex-direction:column;min-width:280px;max-width:50vw;}
.panel.open{transform:translateX(0);}

.resize-handle{position:absolute;top:0;left:0;width:16px;height:100%;cursor:ew-resize;z-index:10;background:transparent;transition:background .2s;}
.resize-handle:hover{background:rgba(0,0,0,.05);}
.resize-handle::before{content:'';position:absolute;left:6px;top:50%;transform:translateY(-50%);width:2px;height:40px;border-radius:2px;background:rgba(0,0,0,.15);transition:background .2s,height .2s;}
.resize-handle:hover::before{background:rgba(0,0,0,.5);height:60px;}
.resize-handle::after{content:'⟺';position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) translateY(36px);font-size:10px;color:rgba(0,0,0,0);transition:color .2s;white-space:nowrap;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em;}
.resize-handle:hover::after{color:rgba(0,0,0,.3);}

.panel-close{position:sticky;top:0;display:flex;justify-content:flex-end;padding:20px 24px 0;background:#fff;z-index:1;}
.panel-close button{background:none;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:18px;line-height:1;color:rgba(0,0,0,.4);transition:color .2s;padding:4px;}
.panel-close button:hover{color:#d4270a;}
.panel-img{width:calc(100% - 48px);height:auto;display:block;margin:16px 24px 0;}
.panel-body{padding:32px 32px 48px;}
.panel-title{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:16px;font-weight:400;color:#111;line-height:1.5;margin-bottom:8px;letter-spacing:0;}
.panel-meta{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#999;margin-bottom:28px;}
.panel-text{font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:13px;font-weight:300;color:#444;line-height:2;}
</style>

<script>
const BOOK_W = 220;

function buildBook(card) {
  const cover      = card.dataset.cover;
  const spine      = card.dataset.spine;
  const spineColor = card.dataset.spineColor || '#1a1a1a';
  const thickness  = parseInt(card.dataset.thickness) || 36;

  const scene = document.createElement('div');
  scene.className = 'book-scene';

  const book = document.createElement('div');
  book.className = 'book';

  const img = new Image();
  img.onload = () => {
    const bookH = Math.round(BOOK_W * (img.naturalHeight / img.naturalWidth));

    book.style.width  = BOOK_W + 'px';
    book.style.height = bookH + 'px';

    // 앞면
    const front = document.createElement('div');
    front.className = 'b-front';
    front.style.width  = BOOK_W + 'px';
    front.style.height = bookH + 'px';
    front.style.transform = 'translateZ(' + (thickness/2) + 'px)';
    const coverImg = document.createElement('img');
    coverImg.src = cover;
    coverImg.alt = card.dataset.title || '';
    const shine = document.createElement('div');
    shine.className = 'b-shine';
    front.appendChild(coverImg);
    front.appendChild(shine);

    // 책등
    const spineEl = document.createElement('div');
    spineEl.className = 'b-spine';
    spineEl.style.width  = thickness + 'px';
    spineEl.style.height = bookH + 'px';
    spineEl.style.transform = 'translateZ(' + (thickness/2) + 'px) translateX(-' + thickness + 'px) rotateY(-90deg)';
    spineEl.style.transformOrigin = '100% 50%';

    const spineColorEl = document.createElement('div');
    spineColorEl.className = 'b-spine-color';
    spineColorEl.style.background = spineColor;
    spineEl.appendChild(spineColorEl);

    if (spine) {
      const spineImg = document.createElement('img');
      spineImg.src = spine;
      spineImg.style.cssText = 'position:absolute;inset:0;width:'+thickness+'px;height:'+bookH+'px;object-fit:fill;z-index:1;';
      spineEl.appendChild(spineImg);
    }
    const spineShade = document.createElement('div');
    spineShade.className = 'b-spine-shade';
    spineEl.appendChild(spineShade);

    // 윗면
    const top = document.createElement('div');
    top.className = 'b-top';
    top.style.width  = BOOK_W + 'px';
    top.style.height = thickness + 'px';
    top.style.background = spineColor;
    top.style.transform = 'translateZ(' + (thickness/2) + 'px) rotateX(90deg) translateY(-' + thickness + 'px)';
    top.style.transformOrigin = '50% 0%';

    book.appendChild(front);
    book.appendChild(spineEl);
    book.appendChild(top);
    scene.appendChild(book);
    card.innerHTML = '';
    card.appendChild(scene);
  };
  img.src = cover;
}

// 모든 카드에 3D 목업 생성
document.querySelectorAll('.card').forEach(card => buildBook(card));

// ── 패널 ──
const panel    = document.getElementById('panel');
const closeBtn = document.getElementById('closeBtn');
const handle   = document.getElementById('resizeHandle');
const grid     = document.getElementById('grid');
const MIN_CARD_W = 240;

function calcCols() {
  const vw = window.innerWidth;
  const panelOpen = document.body.classList.contains('panel-open');
  const panelW = panelOpen ? panel.offsetWidth : 0;
  const availW = vw - panelW - 48;
  const cols = Math.max(1, Math.floor(availW / MIN_CARD_W));
  grid.style.columnCount = Math.min(cols, 4);
}

function openPanel(card) {
  document.getElementById('panelImg').src = card.dataset.detail || card.dataset.cover;
  document.getElementById('panelTitle').textContent = card.dataset.title;
  document.getElementById('panelMeta').textContent  = card.dataset.meta;
  document.getElementById('panelText').textContent  = card.dataset.text;
  panel.classList.add('open');
  document.body.classList.add('panel-open');
  document.documentElement.style.setProperty('--panel-w', panel.offsetWidth + 'px');
  panel.scrollTop = 0;
  calcCols();
}

function closePanel() {
  panel.classList.remove('open');
  document.body.classList.remove('panel-open');
  calcCols();
}

// 카드 클릭 — 이벤트 위임
document.getElementById('grid').addEventListener('click', e => {
  const card = e.target.closest('.card, .card-img');
  if (card) openPanel(card);
});

closeBtn.addEventListener('click', closePanel);
document.addEventListener('keydown', e => { if(e.key==='Escape') closePanel(); });
window.addEventListener('resize', calcCols);
calcCols();

// 패널 드래그
let dragging=false, startX, startW;
handle.addEventListener('mousedown', e=>{dragging=true;startX=e.clientX;startW=panel.offsetWidth;document.body.style.userSelect='none';document.body.style.cursor='ew-resize';});
document.addEventListener('mousemove', e=>{
  if(!dragging)return;
  const newW=Math.min(Math.max(startW-(e.clientX-startX),280),window.innerWidth*0.5);
  panel.style.width=newW+'px';
  document.documentElement.style.setProperty('--panel-w',newW+'px');
  calcCols();
});
document.addEventListener('mouseup',()=>{if(!dragging)return;dragging=false;document.body.style.userSelect='';document.body.style.cursor='';});
</script>

</body>
</html>
