<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>解放 — Portfolio</title>
<link rel="icon" type="image/png" href="images/favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html,body{width:100%;overflow-x:hidden;}

/* 배경 */
.bg{
  position:fixed;inset:0;
  background:#000;
  z-index:0;
}

/* 로고 */
.logo{
  position:fixed;top:22px;left:24px;
  height:52px;width:auto;z-index:200;
  animation:spin 8s linear infinite;
}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}

/* 인스타 + About 묶음 */
.nav-right{
  position:fixed;top:20px;right:24px;
  display:flex;align-items:center;gap:20px;
  z-index:200;
}
.insta{opacity:.85;transition:opacity .2s;}
.insta:hover{opacity:1;}
.insta svg{width:22px;height:22px;fill:white;display:block;}
.about{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;font-weight:400;
  letter-spacing:.18em;text-transform:uppercase;
  color:#fff;
  text-decoration:none;
  transition:opacity .2s;
}
.about:hover{opacity:.6;}
.main{
  position:relative;z-index:10;
  padding:96px 24px 40px;
  transition:padding-right .5s cubic-bezier(.22,1,.36,1);
}
/* 패널 열리면 오른쪽 패딩을 패널 너비만큼 확보 */
body.panel-open .main{
  padding-right: calc(var(--panel-w) + 24px);
}

.grid{
  column-gap:6px;
  transition:column-count .3s;
}

.card{
  break-inside:avoid;
  margin-bottom:6px;
  overflow:hidden;
  cursor:pointer;
}
.card img{
  width:100%;height:auto;display:block;
  transition:transform .6s cubic-bezier(.22,1,.36,1), opacity .3s;
}
.card:hover img{transform:scale(1.03);opacity:.85;}

/* 푸터 */
.copy{
  position:relative;z-index:10;
  text-align:center;padding:20px;
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.4);
}

/* ── 슬라이드 패널 ── */
:root{--panel-w: 480px;}

.panel{
  position:fixed;top:0;right:0;
  width:var(--panel-w);
  height:100vh;
  background:#111;
  z-index:400;
  transform:translateX(100%);
  transition:transform .5s cubic-bezier(.22,1,.36,1);
  overflow-y:auto;
  display:flex;flex-direction:column;
  min-width:280px;
  max-width:50vw;
}
.panel.open{transform:translateX(0);}

.resize-handle{
  position:absolute;top:0;left:0;
  width:16px;height:100%;
  cursor:ew-resize;
  z-index:10;
  background:transparent;
  transition:background .2s;
}
.resize-handle:hover{
  background:rgba(255,255,255,.08);
}
.resize-handle::before{
  content:'';
  position:absolute;
  left:6px;top:50%;
  transform:translateY(-50%);
  width:2px;height:40px;
  border-radius:2px;
  background:rgba(255,255,255,.2);
  transition:background .2s, height .2s;
}
.resize-handle:hover::before{
  background:rgba(255,255,255,.7);
  height:60px;
}
.resize-handle::after{
  content:'⟺';
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%, -50%) translateY(36px);
  font-size:10px;
  color:rgba(255,255,255,0);
  transition:color .2s;
  white-space:nowrap;
  font-family:'IBM Plex Mono',monospace;
  letter-spacing:.1em;
}
.resize-handle:hover::after{
  color:rgba(255,255,255,.4);
}

.panel-close{
  position:sticky;top:0;
  display:flex;justify-content:flex-end;
  padding:20px 24px 0;
  background:#111;z-index:1;
}
.panel-close button{
  background:none;border:none;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;
  font-size:18px;line-height:1;
  color:rgba(255,255,255,.6);
  transition:color .2s;
  padding:4px;
}
.panel-close button:hover{color:#d4270a;}

.panel-img{width:100%;height:auto;display:block;margin-top:16px;}

.panel-body{padding:32px 32px 48px;}
.panel-title{
  font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size:16px;font-weight:400;color:#f2ede6;
  line-height:1.5;margin-bottom:8px;
  letter-spacing:0;
}
.panel-meta{
  font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size:11px;letter-spacing:.05em;text-transform:uppercase;
  color:rgba(255,255,255,.35);margin-bottom:28px;
}
.panel-text{
  font-family:'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size:13px;font-weight:300;color:rgba(255,255,255,.65);line-height:2;
}
</style>
</head>
<body>

<img class="logo" src="images/Logo.png" alt="解放"/>

<div class="nav-right">
  <a class="about" href="about.html">About</a>

<div class="main">
  <div class="grid">
    <div class="card" data-title="나만의 카운슬러 공자" data-meta="출판 · 2025" data-img="images/work1.jpg" data-text="2,500년을 넘어 전해진 공자의 지혜를 오늘의 언어로 재해석한 책. 삶의 방향을 잃었을 때 단단한 기준이 되어주는 철학 에세이다. 흔들리는 마음을 붙잡는 문장들을 한 권에 담았다. 독자 스스로 자신만의 카운슬러를 찾아가는 여정을 그린다. 표지 디자인은 고요함과 긴장감을 동시에 담아내는 방향으로 작업했다.">

<!-- 슬라이드 패널 -->
<div class="panel" id="panel">
  <div class="resize-handle" id="resizeHandle"></div>
  <div class="panel-close">
    <button id="closeBtn">✕</button>
  </div>
  <img class="panel-img" id="panelImg" src="" alt=""/>
  <div class="panel-body">
    <p class="panel-title" id="panelTitle"></p>
    <p class="panel-meta" id="panelMeta"></p>
    <p class="panel-text" id="panelText"></p>
  </div>
</div>

<script>
const panel    = document.getElementById('panel');
const closeBtn = document.getElementById('closeBtn');
const handle   = document.getElementById('resizeHandle');
const grid     = document.querySelector('.grid');

// 썸네일 최소 너비 기준 (px) — 이 값으로 몇 열 들어갈지 계산
const MIN_CARD_W = 200;

function calcCols() {
  const vw = window.innerWidth;
  const panelOpen = document.body.classList.contains('panel-open');
  const panelW = panelOpen ? panel.offsetWidth : 0;
  const availW = vw - panelW - 48; // 좌우 패딩 24px씩
  const cols = Math.max(1, Math.floor(availW / MIN_CARD_W));
  // 최대 4열 제한
  grid.style.columnCount = Math.min(cols, 4);
}

function openPanel(card) {
  document.getElementById('panelImg').src = card.dataset.img;
  document.getElementById('panelTitle').textContent = card.dataset.title;
  document.getElementById('panelMeta').textContent  = card.dataset.meta;
  document.getElementById('panelText').textContent  = card.dataset.text;
  panel.classList.add('open');
  document.body.classList.add('panel-open');
  document.documentElement.style.setProperty('--panel-w', panel.offsetWidth + 'px');
  panel.scrollTop = 0;
  calcCols();
}

function closePanel() {
  panel.classList.remove('open');
  document.body.classList.remove('panel-open');
  calcCols();
}

document.querySelectorAll('.card').forEach(c => {
  c.addEventListener('click', () => openPanel(c));
});
closeBtn.addEventListener('click', closePanel);
document.addEventListener('keydown', e => { if(e.key === 'Escape') closePanel(); });

// 브라우저 리사이즈 대응
window.addEventListener('resize', calcCols);

// 초기 계산
calcCols();

// ── 드래그로 패널 너비 조절 ──
let dragging = false;
let startX, startW;

handle.addEventListener('mousedown', e => {
  dragging = true;
  startX = e.clientX;
  startW = panel.offsetWidth;
  document.body.style.userSelect = 'none';
  document.body.style.cursor = 'ew-resize';
});

document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = startX - e.clientX;
  const maxW = window.innerWidth * 0.5;
  const newW = Math.min(Math.max(startW + dx, 280), maxW);
  panel.style.width = newW + 'px';
  document.documentElement.style.setProperty('--panel-w', newW + 'px');
  calcCols();
});

document.addEventListener('mouseup', () => {
  if (!dragging) return;
  dragging = false;
  document.body.style.userSelect = '';
  document.body.style.cursor = '';
});
</script>

</body>
