<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>解放 — Portfolio</title>
<meta name="description" content="한예은(Han Yeeun) 포트폴리오 — Editorial · Graphic · Identity 디자인 작업. Seoul, KR"/>
<link rel="icon" type="image/png" href="images/favicon.png"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  cursor:url('images/cursor.png') 16 16, auto;
}

/* 벽돌 배경 */
.landing-bg{
  position:fixed;
  inset:0;
  background:url('images/landing-bg.jpg') center/cover no-repeat;
  z-index:0;
}

/* GRAND OPENING 이미지 — 오른쪽 끝에 붙임 */
.grand-opening-wrap{
  position:fixed;
  right:0;
  top:50%;
  transform:translateY(-50%);
  z-index:10;
  cursor:pointer;
  display:block;
  width:clamp(200px, 28vw, 420px);
  filter:drop-shadow(0 8px 32px rgba(0,0,0,0.18));
  transition:transform 0.3s ease, filter 0.3s ease;
}

.grand-opening-wrap:hover{
  transform:translateY(calc(-50% - 6px));
  filter:drop-shadow(0 16px 48px rgba(0,0,0,0.32));
}

.grand-opening-wrap img{
  width:100%;
  height:auto;
  display:block;
}

/* 기본/호버 이미지 전환 */
.grand-opening-wrap .img-default{
  display:block;
}
.grand-opening-wrap .img-hover{
  display:none;
}
.grand-opening-wrap:hover .img-default{
  display:none;
}
.grand-opening-wrap:hover .img-hover{
  display:block;
}

/* 떠다니는 오브젝트 */
.floater{
  position:fixed;
  z-index:5;
  pointer-events:none;
  will-change:transform;
}

/* 모바일 */
@media(max-width:768px){
  html,body{overflow:hidden;}
  .grand-opening-wrap{
    right:50%;
    top:auto;
    bottom:10vw;
    transform:translateX(50%);
    width:clamp(180px, 60vw, 300px);
  }
  .grand-opening-wrap:hover{
    transform:translateX(50%) translateY(-6px);
  }
}
</style>
</head>
<body>

<div class="landing-bg" aria-hidden="true"></div>

<img class="floater" src="images/key.png"     alt="" data-size="160"/>
<img class="floater" src="images/man.png"     alt="" data-size="220"/>
<img class="floater" src="images/tree.png"    alt="" data-size="200"/>
<img class="floater" src="images/welcome.png" alt="" data-size="200"/>

<a class="grand-opening-wrap" href="home.html" aria-label="포트폴리오 홈으로 입장">
  <img class="img-default"
       src="images/grand-opening-default.png"
       alt="GRAND OPENING — 클릭해서 입장"/>
  <img class="img-hover"
       src="images/grand-opening-hover.png"
       alt="GRAND OPENING — 클릭해서 입장"/>
</a>

<script>
(function(){
  const floaters = document.querySelectorAll('.floater');

  floaters.forEach(el => {
    const size = parseInt(el.dataset.size) || 180;
    el.style.width = size + 'px';
    el.style.height = 'auto';

    // 랜덤 초기 위치
    let x = Math.random() * (window.innerWidth  - size);
    let y = Math.random() * (window.innerHeight - size * 1.5);

    // 랜덤 속도 (방향 포함)
    const speed = 0.4 + Math.random() * 0.6;
    let vx = (Math.random() < 0.5 ? 1 : -1) * speed;
    let vy = (Math.random() < 0.5 ? 1 : -1) * speed * 0.7;

    // 흔들림용 위상
    const phase = Math.random() * Math.PI * 2;
    const wobbleAmp  = 1.5 + Math.random() * 2;
    const wobbleFreq = 0.0008 + Math.random() * 0.0006;

    function tick(t){
      const w = window.innerWidth;
      const h = window.innerHeight;
      const elW = el.offsetWidth  || size;
      const elH = el.offsetHeight || size;

      x += vx;
      y += vy;

      // 벽 튕기기
      if(x <= 0)       { x = 0;      vx = Math.abs(vx); }
      if(x >= w - elW) { x = w-elW;  vx = -Math.abs(vx); }
      if(y <= 0)       { y = 0;      vy = Math.abs(vy); }
      if(y >= h - elH) { y = h-elH;  vy = -Math.abs(vy); }

      const wobble = Math.sin(t * wobbleFreq + phase) * wobbleAmp;

      el.style.transform = `translate(${x}px, ${y}px) rotate(${wobble}deg)`;
      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);
  });
})();
</script>
</body>
</html>
