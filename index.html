<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>解放 — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;height:100%;
  overflow:hidden;
}

.bg{
  position:fixed;inset:0;
  background:url('hero.jpg') center/cover no-repeat;
  z-index:0;
}

.bg::after{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.04;pointer-events:none;
}

.logo{
  position:fixed;
  top:22px;left:24px;
  height:52px;width:auto;
  z-index:100;
  mix-blend-mode:multiply;
}

.book{
  position:fixed;
  left:48px;
  bottom:60px;
  width:clamp(160px, 18vw, 280px);
  z-index:50;
  filter:drop-shadow(0 12px 32px rgba(0,0,0,0.45));
  animation:floatIn .9s cubic-bezier(.22,1,.36,1) both;
}

@keyframes floatIn{
  from{opacity:0;transform:translateY(24px);}
  to{opacity:1;transform:translateY(0);}
}

.copy{
  position:fixed;
  bottom:24px;left:48px;
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.45);
  z-index:100;
}

#dot{
  position:fixed;width:7px;height:7px;border-radius:50%;
  background:#d4270a;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .18s,height .18s;
  mix-blend-mode:multiply;
}
</style>
</head>
<body>

<div id="dot"></div>
<div class="bg"></div>

<img class="logo" src="Logo.png" alt="解放"/>
<img class="book" src="work1.jpg" alt="나만의 카운슬러 공자"/>
<p class="copy">©2025 解放. Seoul, KR</p>

<script>
const dot = document.getElementById('dot');
document.addEventListener('mousemove', e => {
  dot.style.left = e.clientX + 'px';
  dot.style.top  = e.clientY + 'px';
});
</script>

</body>
</html>
