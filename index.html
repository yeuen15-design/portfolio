<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>解放 — Portfolio</title>
<meta name="description" content="한예은(Han Yeeun) 포트폴리오 — Editorial · Graphic · Identity 디자인 작업. Seoul, KR"/>
<link rel="icon" type="image/png" href="images/favicon.png"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  cursor:url('images/cursor.png') 16 16, auto;
}

/* 벽돌 배경 */
.landing-bg{
  position:fixed;
  inset:0;
  background:url('images/landing-bg.jpg') center/cover no-repeat;
  z-index:0;
}

/* GRAND OPENING 이미지 — 오른쪽 끝에 붙임 */
.grand-opening-wrap{
  position:fixed;
  right:0;
  top:50%;
  transform:translateY(-50%);
  z-index:10;
  cursor:pointer;
  display:block;
  width:clamp(200px, 28vw, 420px);
  filter:drop-shadow(0 8px 32px rgba(0,0,0,0.18));
  transition:transform 0.3s ease, filter 0.3s ease;
}

.grand-opening-wrap:hover{
  transform:translateY(calc(-50% - 6px));
  filter:drop-shadow(0 16px 48px rgba(0,0,0,0.32));
}

.grand-opening-wrap img{
  width:100%;
  height:auto;
  display:block;
}

/* 기본/호버 이미지 전환 */
.grand-opening-wrap .img-default{
  display:block;
}
.grand-opening-wrap .img-hover{
  display:none;
}
.grand-opening-wrap:hover .img-default{
  display:none;
}
.grand-opening-wrap:hover .img-hover{
  display:block;
}

/* 떠다니는 오브젝트 */
.floater{
  position:fixed;
  z-index:5;
  pointer-events:none;
  will-change:transform;
}

/* 모바일 */
@media(max-width:768px){
  html,body{overflow:hidden;}
  .grand-opening-wrap{
    right:0;
    top:50%;
    transform:translateY(-50%);
    width:clamp(160px, 44vw, 300px);
  }
  .grand-opening-wrap:hover{
    transform:translateY(calc(-50% - 6px));
  }
}

/* 키워드 태그 */
.panel-keywords{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px;}
.kw-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;color:rgba(0,0,0,.45);border:1px solid rgba(0,0,0,.15);border-radius:2px;padding:3px 8px;white-space:nowrap;}
</style>
</head>
<body>

<div class="landing-bg" aria-hidden="true"></div>

<img class="floater" src="images/key.png"     alt="" data-size="320"/>
<img class="floater" src="images/man.png"     alt="" data-size="440"/>
<img class="floater" src="images/tree.png"    alt="" data-size="400"/>
<img class="floater" src="images/welcome.png" alt="" data-size="400"/>

<a class="grand-opening-wrap" href="home.html" aria-label="포트폴리오 홈으로 입장">
  <img class="img-default"
       src="images/grand-opening-default.png"
       alt="GRAND OPENING — 클릭해서 입장"/>
  <img class="img-hover"
       src="images/grand-opening-hover.png"
       alt="GRAND OPENING — 클릭해서 입장"/>
</a>

<script>
(function(){
  const signEl = document.querySelector('.grand-opening-wrap');

  const isMobile = window.innerWidth <= 768;

  // 각 floater의 상태를 배열로 관리
  const items = Array.from(document.querySelectorAll('.floater')).map(el => {
    const size = Math.round((parseInt(el.dataset.size) || 180) * (isMobile ? 0.5 : 1));
    el.style.width = size + 'px';
    el.style.height = 'auto';
    return {
      el, size,
      x: 0, y: 0,
      vx: (Math.random() < 0.5 ? 1 : -1) * (0.4 + Math.random() * 0.5),
      vy: (Math.random() < 0.5 ? 1 : -1) * (0.3 + Math.random() * 0.4),
      phase: Math.random() * Math.PI * 2,
      wobbleAmp:  1.5 + Math.random() * 2,
      wobbleFreq: 0.0008 + Math.random() * 0.0006,
    };
  });

  // 겹치지 않는 초기 위치 배치
  function signBoundary(){
    if(signEl){
      const r = signEl.getBoundingClientRect();
      return r.left > 0 ? r.left : window.innerWidth - r.width;
    }
    return window.innerWidth * 0.68;
  }

  items.forEach((item, i) => {
    const maxTries = 200;
    for(let t = 0; t < maxTries; t++){
      const boundary = signBoundary();
      item.x = Math.random() * Math.max(0, boundary - item.size);
      item.y = Math.random() * Math.max(0, window.innerHeight - item.size);
      // 앞서 배치된 floater들과 겹치는지 확인
      const overlap = items.slice(0, i).some(other => {
        return !(item.x + item.size < other.x ||
                 item.x > other.x + other.size ||
                 item.y + item.size < other.y ||
                 item.y > other.y + other.size);
      });
      if(!overlap) break;
    }
  });

  function loop(t){
    const w = window.innerWidth;
    const h = window.innerHeight;
    const boundary = signBoundary();

    // 이동
    items.forEach(item => {
      item.x += item.vx;
      item.y += item.vy;

      const elW = item.el.offsetWidth  || item.size;
      const elH = item.el.offsetHeight || item.size;
      const maxX = boundary - elW;

      // 벽 튕기기
      if(item.x <= 0)      { item.x = 0;    item.vx =  Math.abs(item.vx); }
      if(item.x >= maxX)   { item.x = maxX; item.vx = -Math.abs(item.vx); }
      if(item.y <= 0)      { item.y = 0;    item.vy =  Math.abs(item.vy); }
      if(item.y >= h - elH){ item.y = h-elH;item.vy = -Math.abs(item.vy); }
    });

    // floater 간 충돌
    for(let i = 0; i < items.length; i++){
      for(let j = i+1; j < items.length; j++){
        const a = items[i], b = items[j];
        const aW = a.el.offsetWidth  || a.size;
        const aH = a.el.offsetHeight || a.size;
        const bW = b.el.offsetWidth  || b.size;
        const bH = b.el.offsetHeight || b.size;

        const overlapX = a.x + aW > b.x && a.x < b.x + bW;
        const overlapY = a.y + aH > b.y && a.y < b.y + bH;

        if(overlapX && overlapY){
          // 중심 간 방향으로 튕기기
          const axC = a.x + aW/2, ayC = a.y + aH/2;
          const bxC = b.x + bW/2, byC = b.y + bH/2;
          const dx = axC - bxC;
          const dy = ayC - byC;
          const len = Math.sqrt(dx*dx + dy*dy) || 1;
          const nx = dx/len, ny = dy/len;

          // 속도 교환 (단순 반사)
          const dot_a = a.vx*nx + a.vy*ny;
          const dot_b = b.vx*nx + b.vy*ny;
          a.vx += (dot_b - dot_a) * nx;
          a.vy += (dot_b - dot_a) * ny;
          b.vx += (dot_a - dot_b) * nx;
          b.vy += (dot_a - dot_b) * ny;

          // 겹침 해소
          const push = 2;
          a.x += nx * push; a.y += ny * push;
          b.x -= nx * push; b.y -= ny * push;
        }
      }
    }

    // 렌더
    items.forEach(item => {
      const wobble = Math.sin(t * item.wobbleFreq + item.phase) * item.wobbleAmp;
      item.el.style.transform = `translate(${item.x}px, ${item.y}px) rotate(${wobble}deg)`;
    });

    requestAnimationFrame(loop);
  }

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
