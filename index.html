<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>解放 — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;
  overflow-x:hidden;
}

.bg{
  position:fixed;inset:0;
  background:url('images/hero.jpg') center/cover no-repeat;
  z-index:0;
}

.bg::after{
  content:'';position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.04;pointer-events:none;
}

.logo{
  position:fixed;
  top:22px;left:24px;
  height:52px;width:auto;
  z-index:100;
  mix-blend-mode:multiply;
}

/* 로고 아래부터 시작하는 그리드 wrapper */
.main{
  position:relative;
  z-index:10;
  padding-top:96px; /* 로고 높이 + 여백 */
  padding-left:24px;
  padding-right:24px;
  padding-bottom:40px;
}

/* masonry grid */
.grid{
  column-count:4;
  column-gap:6px;
}
@media(max-width:1000px){.grid{column-count:3;}}
@media(max-width:680px){.grid{column-count:2;}}

.card{
  break-inside:avoid;
  margin-bottom:6px;
  display:block;
  overflow:hidden;
  cursor:pointer;
}
.card img{
  width:100%;height:auto;
  display:block;
  transition:transform .6s cubic-bezier(.22,1,.36,1), opacity .3s;
}
.card:hover img{transform:scale(1.03);opacity:.88;}

.copy{
  position:relative;z-index:10;
  text-align:center;
  padding:20px;
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:.18em;text-transform:uppercase;
  color:rgba(255,255,255,.4);
}

/* 인스타 아이콘 우상단 */
.insta{
  position:fixed;
  top:26px;right:24px;
  z-index:100;
  opacity:.85;
  transition:opacity .2s;
}
.insta:hover{opacity:1;}
.insta svg{width:24px;height:24px;fill:white;}
  position:fixed;width:7px;height:7px;border-radius:50%;
  background:#d4270a;pointer-events:none;z-index:9999;
  transform:translate(-50%,-50%);
  transition:width .18s,height .18s;
  mix-blend-mode:multiply;
}
</style>
</head>
<body>

<div id="dot"></div>
<div class="bg"></div>

<a class="insta" href="https://instagram.com/haebang.drawing" target="_blank">
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
</a>
<img class="logo" src="images/Logo.png" alt="解放"/>

<div class="main">
  <div class="grid">
    <div class="card"><img src="images/work1.jpg" alt="work1"/></div>
    <div class="card"><img src="images/work2.jpg" alt="work2"/></div>
    <div class="card"><img src="images/work3.jpg" alt="work3"/></div>
    <div class="card"><img src="images/work4.jpg" alt="work4"/></div>
    <div class="card"><img src="images/work5.jpg" alt="work5"/></div>
    <div class="card"><img src="images/work6.jpg" alt="work6"/></div>
  </div>
</div>

<p class="copy">©2025 解放. Seoul, KR</p>

<script>
const dot = document.getElementById('dot');
document.addEventListener('mousemove', e => {
  dot.style.left = e.clientX + 'px';
  dot.style.top  = e.clientY + 'px';
});
</script>

</body>
</html>
